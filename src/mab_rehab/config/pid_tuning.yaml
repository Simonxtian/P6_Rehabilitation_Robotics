# PID / impedance gains per joint. Uploaded to the drive at on_activate(),
# overriding whatever the motor .cfg file provided. Gains are 1:1 with the
# MD registers setPositionPIDparam / setVelocityPIDparam / setImpedanceParams.
#
# Values below match the legacy mab_ros2_control defaults so behaviour is
# identical on the first bringup. Tune per joint as needed.

pid_tuning:
  joints:
    joint_1:
      position_pid:
        kp: 60.500000
        ki: 5.00000
        kd: 0.0
        windup: 8.0
      velocity_pid:
        kp: 30.0
        ki: 4.0
        kd: 0.0
        windup: 5.0
      impedance:
        kp: 0.0
        kd: 0.0
      friction:
        motor_friction: 3.6   # dynamic (viscous) friction [Nm·s/rad]
        motor_stiction: 4.5   # static (breakaway) friction [Nm]
    joint_2:
      position_pid:
        kp: 50.0
        ki: 4.0
        kd: 0.0
        windup: 5.0
      velocity_pid:
        kp: 14.0
        ki: 2.5
        kd: 0.0
        windup: 4.0
      impedance:
        kp: 0.0
        kd: 0.0
      friction:
        motor_friction: 1.5
        motor_stiction: 1.5
    joint_3:
      position_pid:
        kp: 50.0
        ki: 4.0
        kd: 0.0
        windup: 5.0
      velocity_pid:
        kp: 6.0
        ki: 2.5
        kd: 0.1
        windup: 4.0
      impedance:
        kp: 0.0
        kd: 0.0
      friction:
        motor_friction: 0.5
        motor_stiction: 0.5

